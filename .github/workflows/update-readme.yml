name: Update README catalog

on:
  push:
    branches: [main]
    paths:
      - "*/README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read prompt
        id: prompt
        run: |
          {
            echo "content<<EOF"
            cat claude-ci/prompt.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: ${{ steps.prompt.outputs.content }}
          allowed_tools: "Bash,Read,Write,Glob"
