name: Update README catalog

on:
  push:
    branches: [main]
    paths:
      - "*/README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read prompt
        id: prompt
        run: |
          {
            echo "content<<EOF"
            cat claude-ci/prompt.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.content }}

      - name: Create PR if README changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README.md"
            exit 0
          fi

          BRANCH="claude/update-readme-$(date +%s)"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "docs: update README catalog" -m "Auto-generated by Claude CI. Updates the root README with the latest PoC catalog."
          git push origin "$BRANCH"
          gh pr create \
            --fill \
            --base main \
            --head "$BRANCH"
