name: Update README catalog

on:
  push:
    branches: [main]
    paths:
      - "*/README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read prompt
        id: prompt
        run: |
          {
            echo "content<<EOF"
            cat claude-ci/prompt.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            BRANCH: ${{ github.ref_name }}
            
            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model claude-3-haiku-20240307
            --allowedTools "Read,Write,Edit,Bash(ls:*),Bash(find:*),Bash(cat:*),Bash(git:*),Bash(gh:*)"
          show_full_output: true

      # Claude handles the complete workflow including PR creation with gh tool permissions
